<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    width: 300px; margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 14px; line-height: 1.4;
    background: #1c1c1e; color: #f2f2f2;
  }
  .wrap { padding: 14px; }
  h1 { font-size: 15px; font-weight: 600; margin: 0 0 4px; }
  .hint { font-size: 12px; color: #9b9b9f; margin: 0 0 12px; }
  ul {
    list-style: none; margin: 0 0 12px; padding: 0;
    max-height: 230px; overflow-y: auto;
    border: 1px solid #3a3a3c; border-radius: 10px;
  }
  li {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 11px; cursor: pointer;
    border-bottom: 1px solid #2a2a2c;
  }
  li:last-child { border-bottom: none; }
  li:hover { background: #2a2a2c; }
  li.selected { background: #234a73; }
  li img { width: 16px; height: 16px; flex: none; border-radius: 3px; }
  li .ph { width: 16px; flex: none; }
  li .title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  li.empty { cursor: default; color: #9b9b9f; }
  li.empty:hover { background: none; }
  button {
    width: 100%; padding: 10px; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer; color: #fff;
  }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .rec { background: #e0392b; }
  .stop { background: #3a3a3c; }
  .center { text-align: center; }
  .dot {
    display: inline-block; width: 9px; height: 9px; border-radius: 50%;
    background: #e0392b; margin-right: 7px; vertical-align: middle;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
  .timer { font-variant-numeric: tabular-nums; font-size: 26px; margin: 10px 0 6px; }
  .tab-name { font-size: 12px; color: #9b9b9f; margin-bottom: 16px; word-break: break-word; }
  .spin {
    display: inline-block; width: 11px; height: 11px; margin-right: 8px;
    vertical-align: middle; border: 2px solid #555; border-top-color: #4a90e2;
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { font-size: 14px; margin: 12px 0 14px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="wrap" id="app">Carregando…</div>
  <script src="popup.js"></script>
</body>
</html>
